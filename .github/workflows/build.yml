name: Build APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            libxml2-dev libxslt1-dev libjpeg-dev

      - name: Install Python tools
        run: |
          pip install --user --upgrade pip
          pip install --user "buildozer>=1.5.0" "cython<3.0.0" virtualenv

      - name: Build APK
        run: |
          export PATH=$PATH:$HOME/.local/bin
          buildozer android debug
        env:
          USE_SDK_WRAPPER: "1"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RulateCrawler-Debug
          path: bin/*.apk