name: Build APK
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y autoconf automake libtool libltdl-dev openjdk-17-jdk unzip curl \
            libxml2-dev libxslt1-dev libjpeg-dev libpng-dev
          sudo pip install buildozer cython

      - name: Clean old NDK and p4a cache
        run: |
          rm -rf $HOME/.buildozer
          rm -rf $GITHUB_WORKSPACE/.buildozer

      - name: Download and extract stable python-for-android
        run: |
          P4A_URL="https://github.com/kivy/python-for-android/archive/refs/tags/2023.11.15.tar.gz"
          P4A_DIR="$GITHUB_WORKSPACE/.buildozer/android/platform/python-for-android"
          mkdir -p $(dirname $P4A_DIR)
          curl -L $P4A_URL -o /tmp/p4a.tar.gz
          tar -xzf /tmp/p4a.tar.gz -C $(dirname $P4A_DIR) --strip-components=1
          mv $(dirname $P4A_DIR)/python-for-android-2023.11.15 $P4A_DIR
          rm /tmp/p4a.tar.gz

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RulateCrawler-APK
          path: bin/*.apk
          retention-days: 30