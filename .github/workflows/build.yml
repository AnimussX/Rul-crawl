name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y autoconf automake libtool libltdl-dev openjdk-17-jdk unzip curl \
            libxml2-dev libxslt1-dev libjpeg-dev libpng-dev
          sudo pip install buildozer cython

      - name: Clean old NDK and p4a cache
        run: |
          rm -rf $HOME/.buildozer
          rm -rf $GITHUB_WORKSPACE/.buildozer

      - name: Patch lxml recipe (force static libraries)
        run: |
          RECIPE_DIR="$GITHUB_WORKSPACE/.buildozer/android/platform/python-for-android/pythonforandroid/recipes/lxml"
          if [ -f "$RECIPE_DIR/setupinfo.py" ]; then
            # Заменяем library_dirs([]) на использование static_library_dirs, если они заданы
            sed -i 's/library_dirs=library_dirs(\[\]))/library_dirs=static_library_dirs if static_library_dirs else library_dirs(\[\]))/g' "$RECIPE_DIR/setupinfo.py"
            echo "lxml recipe patched."
          else
            echo "lxml recipe not found yet; will patch after p4a clone."
          fi
        shell: bash

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RulateCrawler-APK
          path: bin/*.apk
          retention-days: 30