name: Build APK
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK with Buildozer Action
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          buildozer_spec: buildozer.spec